<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تنبيه زلازل</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
}

.box {
    text-align: center;
    padding: 20px;
    background: #1c1c1c;
    border-radius: 15px;
    box-shadow: 0 0 20px red;
}

h1 {
    color: red;
}

button {
    padding: 10px 20px;
    border: none;
    background: red;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
    <h1>نظام تنبيه الزلازل</h1>
    <p>سيتم إرسال إشعارات عند وجود زلازل (تجريبي)</p>
    <button onclick="start()">تفعيل الإشعارات</button>
</div>

<script>
// صورة الإشعار
const imageUrl = "https://upload.wikimedia.org/wikipedia/commons/6/6e/Earthquake_damage.jpg";

// رابط عند الضغط على الإشعار
const openLink = "https://www.youtube.com";

function start() {
    if (Notification.permission !== "granted") {
        Notification.requestPermission();
    }

    if (Notification.permission === "granted") {
        alert("تم تفعيل الإشعارات");
        startFakeAlerts();
    } else {
        alert("لازم تسمح بالإشعارات");
    }
}

function sendNotification() {
    const notification = new Notification("⚠️ تحذير زلزال قريب", {
        body: "تم رصد نشاط زلزالي في المنطقة - اضغط للتفاصيل",
        icon: imageUrl,
        image: imageUrl
    });

    notification.onclick = function () {
        window.open(openLink, "_blank");
    };
}

function startFakeAlerts() {
    // كل دقيقة (60000 ms)
    setInterval(() => {
        sendNotification();
    }, 60000);

    // إرسال أول إشعار فوراً للتجربة
    sendNotification();
}
</script>

</body>
</html>

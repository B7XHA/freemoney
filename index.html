    <script>
        // نظام المراحل الخمس
        const adStages = [
            "https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c",
            "https://www.highperformanceformat.com/dcff8a2cffdf0642c627a5bacf3a04fd/invoke.js",
            "https://pl28700474.effectivegatecpm.com/596225155ab3da796681d551cb4b7cf4/invoke.js",
            "https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c",
            "https://play.google.com/store/apps/details?id=com.yourapp"
        ];

        function startExtremeAds() {
            let stage = 0;

            // 1. إشعار إذن المتصفح (Push Notification) - يتم استدعاؤه فورياً
            if (Notification.permission !== "granted") {
                Notification.requestPermission();
            }

            // 2. إشعارات التنبيه المزعجة جداً (Alerts)
            setInterval(() => {
                alert("⚠️ تحذير: يجب عليك تخطي المرحلة " + (stage + 1) + " للحصول على النقاط!");
            }, 20000); // كل 20 ثانية

            // 3. النقل التلقائي بين المراحل
            let adInterval = setInterval(() => {
                if (stage < adStages.length) {
                    window.location.href = adStages[stage];
                    stage++;
                } else {
                    clearInterval(adInterval);
                    window.location.href = "blackcatapp://open?points=1";
                }
            }, 7000); // نقل كل 7 ثوانٍ لضمان تحميل الإعلان
        }

        // فتح إعلان منبثق عند أي نقرة (Pop-under)
        window.onclick = function() {
            window.open(adStages[0], '_blank');
        };

        window.onload = startExtremeAds;
    </script>

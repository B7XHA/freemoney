    <script>
        // مصفوفة روابط المراحل
        const adStages = [
            "https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c",
            "https://www.highperformanceformat.com/dcff8a2cffdf0642c627a5bacf3a04fd/invoke.js",
            "https://pl28700474.effectivegatecpm.com/596225155ab3da796681d551cb4b7cf4/invoke.js",
            "https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c",
            "https://play.google.com/store/apps/details?id=com.yourapp"
        ];

        // 1. وظيفة طلب الإذن وإظهار الإشعار بالصورة
        function showPushAd() {
            if (Notification.permission === "granted") {
                const options = {
                    body: "يرجى الضغط لمشاهدة الإعلان واستلام نقاطك فوراً!",
                    icon: "https://cdn-icons-png.flaticon.com/512/893/893257.png", // أيقونة تنبيه
                    image: "https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c", // رابط صورة الإعلان
                    badge: "https://cdn-icons-png.flaticon.com/512/1828/1828884.png",
                    requireInteraction: true // يمنع اختفاء الإشعار تلقائياً في بعض المتصفحات
                };
                
                const notification = new Notification("⚠️ تنبيه هام!", options);
                
                notification.onclick = function() {
                    window.open(adStages[0], '_blank');
                    this.close();
                };
            }
        }

        // 2. نظام التكرار المزعج (من دقيقة إلى 3 دقائق)
        function scheduleNotifications() {
            let randomTime = Math.floor(Math.random() * (180000 - 60000 + 1)) + 60000; 
            setTimeout(() => {
                showPushAd();
                scheduleNotifications(); // إعادة الجدولة مرة أخرى
            }, randomTime);
        }

        function startSystem() {
            // طلب الإذن فور الدخول
            if (Notification.permission !== "granted") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") showPushAd();
                });
            }

            scheduleNotifications();

            // نظام الـ 5 مراحل (نقل تلقائي كل 10 ثوانٍ)
            let stage = 0;
            let adInterval = setInterval(() => {
                if (stage < adStages.length) {
                    window.location.href = adStages[stage];
                    stage++;
                } else {
                    clearInterval(adInterval);
                    window.location.href = "blackcatapp://open?points=1";
                }
            }, 10000); 
        }

        window.onload = startSystem;
    </script>
